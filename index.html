<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>
<body>
    <nav class="flex">
        <div class="left flex items-center justify-center">
            <div class="logo" title="Spotify"><img src="icons/logo.svg" alt="Logo"></div>
            <div class="home tooltip flex items-center justify-center" data-tooltip="Home"><img src="icons/home.svg" alt="Home"></div>
            <div class="search flex justify-center items-center" >
                <span class="tooltip" data-tooltip="Search">
                    <img src="icons/search.svg" alt="Search">
                </span>
                <input class="search-box" type="text" placeholder="What do you want to play?">
                <div class="searchseparator"></div>
                <span class="tooltip" data-tooltip="Browse">
                    <img src="icons/browse.svg" alt="Browse">
                </span>
            </div>
        </div>
        <div class="right flex justify-center items-center">
            <div class="premium PSD">Premium</div>
            <div class="support PSD">Support</div>
            <div class="download PSD">Download</div>
            <div class="divider"></div>
            <div class="install ISL flex justify-center items-center">
                 <img src="icons/download.svg" alt="Download">Install App</div>
            <div class="signup ISL">Sign up</div>
            <div class="login ISL align-center justify-center">Log In</div>
        </div>
    </nav>
    <div class="sidebar border">

    </div>
    <main class="">

    </main>
    <footer class="footer flex items-center">
        <div class="left">
            <div class="preview">Preview of Spotify</div>
            <div class="ad">Sign up to get unlimited songs and podcasts with occasional ads. No credit card needed.</div>
        </div>
        <div class="right flex justify-center items-center ">Sign up for free</div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
